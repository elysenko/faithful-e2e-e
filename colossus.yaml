# colossus.yaml — generated by scaffolder, read by deploy agents.
# Do not delete. The deploy agents use this instead of framework auto-detection.
# {{IMAGE_NAME}} is a placeholder substituted by the deploy agent at build time.
#
# SINGLE-CONTAINER MODEL (see ARCHITECTURE.md):
# The root Dockerfile builds the Angular SPA AND the NestJS API into one image.
# NestJS serves the compiled SPA (ServeStaticModule) and the /api/* routes on
# port 8080 — matching k8s service.yaml targetPort 8080. There is no separate
# frontend/backend service.
framework: dockerfile
dockerfile: Dockerfile
buildDir: .
port: 8080
baseHref: "/{{IMAGE_NAME}}/"
# The Angular <base href> is set at image-build time from the APP_BASE_HREF
# build-arg (default "/"). If serving under the ingress sub-path, build with:
#   --build-arg APP_BASE_HREF=/{{IMAGE_NAME}}/
buildArgs:
  APP_BASE_HREF: "/{{IMAGE_NAME}}/"
